    <!-- ENCABEZADO -->

        </nav>

    <!-- CONTACTO -->

    <section class="contacto">

        <h1>Contáctanos</h1>

        <p>¿Tienes alguna duda o deseas reservar una cita?</p>

        <form id="formulario">

            <input
                type="text"
                id="nombre"
                placeholder="Nombre completo"
                required>

            <input
                type="tel"
                id="telefono"
                placeholder="Número de teléfono"
                required>

            <textarea
                id="mensaje"
                rows="5"
                placeholder="Escribe tu mensaje..."
                required></textarea>

            <button
                type="button"
                onclick="enviarWhatsApp()">

                Enviar por WhatsApp

            </button>

        </form>

    </section>

    <!-- INFORMACIÓN -->

    <section class="info">

        <h2>Información</h2>

        <p><strong>Gabby's Estilo Unisex</strong></p>

        <p>📱 WhatsApp: +593 991582124</p>

        <p>📍 Ecuador</p>

        <p>🕒 Lunes a Sábado</p>

        <p>09:00 AM - 07:00 PM</p>

    </section>

    <!-- MAPA -->

    <section class="mapa">

        <h2>Ubicación</h2>

        <iframe
            src="https://www.google.com/maps?q=Ecuador&output=embed"
            width="100%"
            height="350"
            style="border:0;"
            allowfullscreen=""
            loading="lazy">
        </iframe>

    </section>

    <script src="js/main.js"></script>
